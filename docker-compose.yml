
services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./local_db:/app/local_db
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - app-network

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "3000:3000"
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434" # Changed host port to 11435 to avoid conflict with local Ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    command: serve

  # Optional: PostgreSQL instead of SQLite for production
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: smartstudyhub
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - app-network

volumes:
  ollama_data:
  # postgres_data:

networks:
  app-network:
    driver: bridge